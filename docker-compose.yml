services:
  # PHP Application Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: rasagroup/app
    container_name: ${APP_CONTAINER_NAME:-rasagroup-app}
    restart: unless-stopped
    tty: true
    env_file:
      - .env
    environment:
      SERVICE_NAME: ${APP_SERVICE_NAME:-app}
      SERVICE_TAGS: ${APP_SERVICE_TAGS:-dev}
    working_dir: /var/www
    depends_on:
      - db
      - redis
    networks:
      - rasagroup-network

  # Nginx Service
  web:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    image: rasagroup/web
    container_name: ${WEB_CONTAINER_NAME:-rasagroup-web}
    restart: unless-stopped
    tty: true
    # Host 80/443 dipakai domain lain: map ke port bebas (mis. 18080) lalu terminate TLS di nginx host.
    ports:
      - "${WEB_HTTP_PORT:-18080}:80"
    depends_on:
      - app
    networks:
      - rasagroup-network

  # MySQL Service
  db:
    image: mysql:8.0
    container_name: ${DB_CONTAINER_NAME:-rasagroup-db}
    restart: unless-stopped
    tty: true
    # Port host: hindari bentrok dengan MySQL yang sudah jalan di server (3306).
    ports:
      - "${DB_EXPOSE_PORT:-3307}:3306"
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-rasagroup}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-password}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_USER: ${DB_USERNAME:-user}
      SERVICE_TAGS: ${DB_SERVICE_TAGS:-dev}
      SERVICE_NAME: ${DB_SERVICE_NAME:-mysql}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - rasagroup-network

  # phpMyAdmin (akses dari host: PHPMYADMIN_PORT → HTTP di container)
  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: ${PHPMYADMIN_CONTAINER_NAME:-rasagroup-phpmyadmin}
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      UPLOAD_LIMIT: 64M
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
    networks:
      - rasagroup-network

  # Redis Service
  redis:
    image: redis:alpine
    container_name: ${REDIS_CONTAINER_NAME:-rasagroup-redis}
    restart: unless-stopped
    tty: true
    ports:
      - "${REDIS_EXPOSE_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    networks:
      - rasagroup-network

# Networks
networks:
  rasagroup-network:
    driver: bridge

# Volumes
volumes:
  dbdata:
  redisdata:
