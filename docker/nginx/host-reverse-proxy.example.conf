# Contoh untuk nginx di SERVER (bukan di container).
# Setelah Docker jalan dengan WEB_HTTP_PORT=18080, sertakan isi ini di konfigurasi nginx host
# dan sesuaikan path sertifikat (Let's Encrypt, dll.).
#
# Alur: browser https://dev-rasagroup.stt.co.id → nginx host :443 → proxy http://127.0.0.1:18080 → container web
#
# --- Cloudflare: error 525 "SSL handshake failed" ---
# 525 = Cloudflare tidak bisa TLS ke SERVER ASAL (origin), bukan masalah sertifikat yang user lihat di browser.
# Perbaikan (pilih salah satu):
# 1) SSL/TLS mode di Cloudflare: "Full (strict)" hanya jika origin :443 punya sertifikat publik valid
#    (Let's Encrypt di VM, atau Cloudflare Origin Certificate dipasang di nginx origin).
# 2) Mode "Full": origin harus HTTPS; sertifikat boleh self-signed (tidak disarankan produksi).
# 3) Mode "Flexible": Cloudflare → origin pakai HTTP (biasanya origin :80). Hanya pakai jika origin tidak
#    punya HTTPS; kurang aman (trafik CF→VM tidak dienkripsi).
# 4) Pastikan firewall VM mengizinkan IP Cloudflare ke port 443 (dan 80 jika dipakai) ke nginx origin.
# 5) Pastikan ssl_certificate memakai fullchain.pem (bukan hanya cert.pem) agar rantai lengkap ke klien origin.

upstream dev_rasagroup_docker {
    server 127.0.0.1:18080;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name dev-rasagroup.stt.co.id;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name dev-rasagroup.stt.co.id;

    ssl_certificate     /etc/letsencrypt/live/dev-rasagroup.stt.co.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev-rasagroup.stt.co.id/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://dev_rasagroup_docker;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
